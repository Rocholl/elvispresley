# Solo si el repo es privado: cp docker-compose.override.example.yml docker-compose.override.yml
services:
  abuela:
    volumes:
      - ./deploy-key:/run/secrets/deploy_key:ro
    environment:
      GIT_SSH_COMMAND: ssh -i /run/secrets/deploy_key -o StrictHostKeyChecking=accept-new -o IdentitiesOnly=yes
